name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and upload
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          TITLE="OMS ${TAG}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists"
          else
            gh release create "$TAG" --title "$TITLE" --draft --generate-notes
          fi

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run build && npm run build:all && npx electron-builder --publish never

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          FILE=$(ls release/*.dmg | head -1)
          gh release upload "$TAG" "$FILE" --clobber
          if [ -f release/latest-mac.yml ]; then
            gh release upload "$TAG" release/latest-mac.yml --clobber
          fi

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build && npm run build:all && npx electron-builder --publish never

      - name: Upload EXE to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          cd release
          for f in *.exe; do
            [ -f "$f" ] && gh release upload "$TAG" "$f" --clobber && echo "Uploaded $f"
          done
          if [ -f latest.yml ]; then
            gh release upload "$TAG" latest.yml --clobber
          fi
          if ! ls *.exe 1>/dev/null 2>&1; then
            echo "No EXE found, listing all release files:"
            ls -la
          fi
