appId: com.ohmyapp.musicstudio
productName: OMS
directories:
  output: release

files:
  - dist/**/*
  - .next/standalone/.next/server/app/index.html
  - .next/static/**/*
  - package.json
  - "!node_modules/**/*"
  - node_modules/electron-log/**/*

mac:
  target: dmg
  icon: build/icon.icns
  category: public.app-category.music
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extendInfo:
    CFBundleDisplayName: OMS
    NSAudioCaptureUsageDescription: "OMS needs microphone access for audio device detection and monitoring."

win:
  target: nsis
  icon: build/icon.png
